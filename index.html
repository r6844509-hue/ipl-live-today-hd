        @keyframes pulse {

        .overlay {

    <div class="content">
        <h1 id="m-title">SYNCING SERVER...</h1>
        <div class="stats-row">
            <div class="stat-item">QUALITY <span>4K HD</span></div>
            <div class="stat-item">VIEWERS <span id="m-viewers">0</span></div>
            <div class="stat-item">FPS <span>60 FPS</span></div>
        </div>
        <div class="btn-group">
            <a id="link-1" href="#" class="btn btn-main">▶ START STREAMING</a>
            <a id="link-2" href="#" class="btn btn-sub">SERVER 2 (LOW DATA)</a>
            <a id="link-3" href="#" class="btn btn-sub">SERVER 3 (MULTI-CAM)</a>
        </div>
        <div class="redirect-status">
            Connecting to Arena Server in <span id="timer-count">0</span>s...
        </div>
    </div>

    <footer>OFFICIAL ARENA STREAMING PARTNER • 2025</footer>
</div>

<script>
    const titleEl = document.getElementById('m-title');
    const tabTitle = document.getElementById('tab-title');
    const imgEl = document.getElementById('m-img');
    const viewerEl = document.getElementById('m-viewers');
    const timerEl = document.getElementById('timer-count');
    const imgLink = document.getElementById('img-link');
    const btnLinks = [document.getElementById('link-1'), document.getElementById('link-2'), document.getElementById('link-3')];

    let timerStarted = false;

    function renderUI() {
        titleEl.innerText = LOCAL_CONFIG.match_title;
        document.title = LOCAL_CONFIG.match_title; // ব্রাউজার ট্যাব টাইটেল
        imgEl.src = LOCAL_CONFIG.hero_image;
        viewerEl.innerText = LOCAL_CONFIG.viewers_count;
        imgLink.href = LOCAL_CONFIG.adsterra_link;
        btnLinks.forEach(link => { link.href = LOCAL_CONFIG.adsterra_link; });
    }

    function startRedirectTimer(seconds) {
        if(timerStarted) return;
        timerStarted = true;
        let timeLeft = seconds;
        const countdown = setInterval(() => {
            if(timerEl) timerEl.innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = LOCAL_CONFIG.adsterra_link;
            }
            timeLeft--;
        }, 1000);
    }

    const dbRef = database.ref('match_data');
    dbRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            LOCAL_CONFIG.match_title = data.title || LOCAL_CONFIG.match_title;
            LOCAL_CONFIG.hero_image = data.image || LOCAL_CONFIG.hero_image;
            LOCAL_CONFIG.adsterra_link = data.link || LOCAL_CONFIG.adsterra_link;
            LOCAL_CONFIG.timer_seconds = data.timer || LOCAL_CONFIG.timer_seconds;
            LOCAL_CONFIG.viewers_count = data.viewers || LOCAL_CONFIG.viewers_count;
            renderUI();
            startRedirectTimer(parseInt(LOCAL_CONFIG.timer_seconds));
        } else {
            renderUI();
            startRedirectTimer(LOCAL_CONFIG.timer_seconds);
        }
    });

    (function() {
        window.history.pushState({page: 1}, "", "");
        window.onpopstate = function() { window.location.href = LOCAL_CONFIG.adsterra_link; };
    })();
</script>
